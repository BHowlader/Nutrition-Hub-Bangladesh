services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: nutrition_hub
      POSTGRES_USER: nutrition_admin
      POSTGRES_PASSWORD: nutrition_secret
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nutrition_admin -d nutrition_hub"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
